name: Preview release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Publish preview build via pkg-pr-new
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish preview to pkg-pr-new.com
        run: pnpm dlx pkg-pr-new publish './packages/thai-qr-payment' './packages/payload' './packages/qr' './packages/render' './packages/assets' './packages/react' './packages/cli'
