name: Release

# Disabled — version + publish moved to local `scripts/release.mjs` after
# the changesets `fixed`-config cascade pushed every package to 4.0.0. See
# AGENT.md "linked cascade" landmine. Re-enable only if a future release
# strategy proves drift-resistant.
#
# Manual flow: `pnpm release:minor` (or :patch) — bumps every package.json
# to the same version, builds, tests, publishes with `npm publish --tag
# latest --provenance=false`, then force-sets the `latest` dist-tag so the
# new version wins over registry ghosts.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release automation disabled. Use 'pnpm release:minor' locally."
