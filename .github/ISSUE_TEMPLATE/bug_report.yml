name: Bug report
description: Something is broken in @thai-qr-payment/*
title: '[bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — the more we know, the faster we can fix it.

  - type: input
    id: package
    attributes:
      label: Package
      placeholder: '@thai-qr-payment/payload'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '0.1.0'
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Code snippet, CLI command, or a minimal repo URL.
      render: ts
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: 'Node 22, Bun 1.1, browser, Cloudflare Worker, etc.'
    validations:
      required: true
